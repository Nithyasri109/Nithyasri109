<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 320" width="100%" height="100%">
  <!-- Definitions for gradients, patterns, and filters -->
  <defs>
    <!-- Dark Cyberpunk Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12" />
      <stop offset="50%" stop-color="#050508" />
      <stop offset="100%" stop-color="#0c0914" />
    </linearGradient>
    <linearGradient id="neon-grad-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <linearGradient id="neon-grad-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>

    <!-- Glowing effects -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Styling & Animations */
    .title-text {
      font-family: 'Outfit', 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-weight: 800;
      font-size: 36px;
      fill: #ffffff;
      letter-spacing: 3px;
    }
    .neon-cyan {
      fill: url(#neon-grad-cyan);
      filter: url(#glow-cyan);
    }
    .neon-pink {
      fill: url(#neon-grad-pink);
      filter: url(#glow-pink);
    }
    .mono-text {
      font-family: 'Fira Code', 'Courier New', Courier, monospace;
      font-size: 13px;
      fill: #a0aec0;
    }
    .mono-accent {
      fill: #00f0ff;
      font-weight: bold;
    }
    
    /* Animations */
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor {
      animation: blink 1s infinite;
      fill: #ff007f;
    }
    
    @keyframes grid-move {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }
    .grid-lines {
      stroke: #7000ff;
      stroke-width: 0.8;
      stroke-opacity: 0.25;
    }
    .grid-lines-moving {
      animation: grid-move 3s linear infinite;
    }
    
    @keyframes pulse-box {
      0%, 100% { stroke-opacity: 0.4; }
      50% { stroke-opacity: 0.9; }
    }
    .pulse-border {
      animation: pulse-box 4s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
      20%, 24%, 55% { opacity: 0.5; }
    }
    .flicker-text {
      animation: flicker 6s infinite;
    }
  </style>

  <!-- Background -->
  <rect width="850" height="320" fill="url(#bg-grad)" />

  <!-- Cyberpunk Synthwave Grid (Perspective) -->
  <g opacity="0.6">
    <!-- Perspective lines emanating from horizon at (425, 120) -->
    <line x1="425" y1="120" x2="-200" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="-50" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="100" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="250" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="400" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="450" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="600" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="750" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="900" y2="320" class="grid-lines" />
    <line x1="425" y1="120" x2="1050" y2="320" class="grid-lines" />

    <!-- Mask to clip moving grid lines -->
    <mask id="grid-mask">
      <rect x="0" y="120" width="850" height="200" fill="#ffffff" />
    </mask>

    <!-- Animated Horizontal Lines -->
    <g mask="url(#grid-mask)">
      <g class="grid-lines-moving">
        <line x1="-200" y1="120" x2="1050" y2="120" class="grid-lines" />
        <line x1="-200" y1="160" x2="1050" y2="160" class="grid-lines" />
        <line x1="-200" y1="200" x2="1050" y2="200" class="grid-lines" />
        <line x1="-200" y1="240" x2="1050" y2="240" class="grid-lines" />
        <line x1="-200" y1="280" x2="1050" y2="280" class="grid-lines" />
        <line x1="-200" y1="320" x2="1050" y2="320" class="grid-lines" />
        <line x1="-200" y1="360" x2="1050" y2="360" class="grid-lines" />
      </g>
    </g>
    
    <!-- Horizon Glow -->
    <ellipse cx="425" cy="120" rx="250" ry="2" fill="#00f0ff" opacity="0.3" filter="url(#glow-cyan)" />
    <ellipse cx="425" cy="120" rx="150" ry="1" fill="#ff007f" opacity="0.4" filter="url(#glow-pink)" />
  </g>

  <!-- Neon Frame Border -->
  <rect x="15" y="15" width="820" height="290" rx="8" fill="none" stroke="#7000ff" stroke-width="1.5" class="pulse-border" opacity="0.6" />
  <rect x="14" y="14" width="822" height="292" rx="9" fill="none" stroke="#00f0ff" stroke-width="0.5" opacity="0.4" />

  <!-- Code Terminal Header Panel -->
  <g transform="translate(40, 35)">
    <!-- Terminal dots -->
    <circle cx="15" cy="15" r="5" fill="#ff5f56" />
    <circle cx="30" cy="15" r="5" fill="#ffbd2e" />
    <circle cx="45" cy="15" r="5" fill="#27c93f" />
    
    <!-- Path breadcrumb / status -->
    <text x="70" y="19" class="mono-text" font-size="11">guest@cyber-terminal: ~/<tspan class="mono-accent">profile</tspan></text>
    
    <!-- Decorative scanline panel/badge -->
    <rect x="680" y="5" width="90" height="18" rx="3" fill="#1a1a2e" stroke="#00f0ff" stroke-width="0.5" opacity="0.8" />
    <text x="690" y="17" class="mono-text" font-size="9" fill="#00f0ff">ONLINE [V2.6]</text>
  </g>

  <!-- Main Content inside Terminal -->
  <!-- Left Side: Terminal Log / Status -->
  <g transform="translate(40, 90)">
    <text x="15" y="20" class="mono-text">&gt; INITIALIZING PORTAL...</text>
    <text x="15" y="45" class="mono-text">&gt; SCANNING TECH STACK...</text>
    
    <!-- Tech stack listing with custom color bullets -->
    <text x="30" y="70" class="mono-text">
      <tspan class="mono-accent">FRONTEND:</tspan> React / Next.js / TypeScript / Tailwind
    </text>
    <text x="30" y="95" class="mono-text">
      <tspan class="mono-accent">BACKEND :</tspan> Node.js / Express / Python / Go / DBs
    </text>
    <text x="30" y="120" class="mono-text">
      <tspan class="mono-accent">STATUS  :</tspan> Building creative digital systems
    </text>
    
    <text x="15" y="150" class="mono-text">&gt; CONNECTING SECURE SOCKET... <tspan fill="#ff007f" font-weight="bold">READY</tspan></text>
    
    <!-- Terminal prompt with cursor -->
    <text x="15" y="180" class="mono-text" font-size="14">
      <tspan fill="#00f0ff">user@github:~$</tspan> npm run dev<tspan class="cursor" font-weight="bold">_</tspan>
    </text>
  </g>

  <!-- Right Side: Big Cyberpunk Title -->
  <g transform="translate(460, 100)">
    <!-- Behind glowing element -->
    <text x="0" y="40" class="title-text neon-cyan flicker-text">CYBER_DEV</text>
    <text x="0" y="85" class="title-text neon-pink">WORKSPACE</text>
    
    <text x="5" y="125" class="mono-text" font-size="11" fill="#7000ff" font-weight="bold"># FULL-STACK DEVELOPER</text>
    
    <!-- Design accent lines -->
    <line x1="0" y1="140" x2="280" y2="140" stroke="#ff007f" stroke-width="2" stroke-dasharray="10 5 150 5 20 5" filter="url(#glow-pink)" />
    <line x1="0" y1="148" x2="180" y2="148" stroke="#00f0ff" stroke-width="1" stroke-dasharray="5 5 100 5 50" filter="url(#glow-cyan)" />
  </g>
  
  <!-- Cybernetic Grid Decors -->
  <g transform="translate(730, 240)" opacity="0.7">
    <rect x="0" y="0" width="8" height="8" fill="#ff007f" />
    <rect x="12" y="0" width="8" height="8" fill="#00f0ff" />
    <rect x="24" y="0" width="8" height="8" fill="#7000ff" />
    <rect x="0" y="12" width="8" height="8" fill="#7000ff" />
    <rect x="12" y="12" width="8" height="8" fill="none" stroke="#a0aec0" stroke-width="1" />
    <rect x="24" y="12" width="8" height="8" fill="#ff007f" />
  </g>
</svg>
